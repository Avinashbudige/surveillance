name: CI Model Train

on:
  push:
    branches: [main]
  pull_request:

jobs:
  train-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r app/requirements.txt
      - run: echo "Add model training checks here"
